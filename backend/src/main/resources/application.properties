# ========================
# Cloud MySQL Configuration
# Replace with your cloud DB credentials
# ========================
spring.datasource.url=jdbc:mysql://<YOUR_CLOUD_HOST>:<PORT>/<DATABASE_NAME>?useSSL=true&serverTimezone=UTC
spring.datasource.username=<YOUR_USERNAME>
spring.datasource.password=<YOUR_PASSWORD>
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Application
server.port=8080
spring.application.name=library-management
